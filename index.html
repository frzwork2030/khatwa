<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>خطوة — رفيقك اليومي في بناء عاداتك</title>

<!-- ===== PWA: يخلي الملف يفتح "زي تطبيق" لما يُحفظ على الشاشة الرئيسية ===== -->
<meta name="theme-color" content="#12102A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="خطوة">
<link id="manifestLink" rel="manifest">
<link id="appleIconLink" rel="apple-touch-icon">
<link id="faviconLink" rel="icon" type="image/svg+xml">
<style>
@import url('https://fonts.googleapis.com/css2?family=Lalezar&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700;800&display=swap');

:root{
  --bg:#12102A;
  --bg-deep:#0B0A1E;
  --surface:#1D1B3A;
  --surface-light:#2A2854;
  --gold:#E8B84B;
  --gold-glow: rgba(232,184,75,.55);
  --teal:#2EC4B6;
  --coral:#FF6B6B;
  --text:#F5F3FF;
  --text-dim:#A9A6C9;
  --radius: 22px;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background: radial-gradient(120% 100% at 50% -10%, #241F52 0%, var(--bg) 45%, var(--bg-deep) 100%);
  color:var(--text);
  font-family:'IBM Plex Sans Arabic', sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  overflow-x:hidden;
}
#app{
  width:100%;
  max-width:460px;
  min-height:100vh;
  position:relative;
  display:flex;
  flex-direction:column;
  padding-bottom:86px;
}
.display{font-family:'Lalezar', sans-serif; letter-spacing:.5px;}

/* ---------- Screens ---------- */
.screen{display:none; padding:22px 20px 10px; animation:fadeIn .35s ease;}
.screen.active{display:block;}
@keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

/* ---------- Onboarding ---------- */
#screen-onboarding{padding-top:48px;}
.logo-wrap{text-align:center; margin-bottom:28px;}
.logo-mark{
  width:74px; height:74px; margin:0 auto 14px;
  background:conic-gradient(from 0deg, var(--gold), var(--teal), var(--coral), var(--gold));
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 40px var(--gold-glow);
}
.logo-mark::after{
  content:"";
  width:52px; height:52px; border-radius:50%;
  background:var(--bg-deep);
}
.logo-title{font-size:38px; color:var(--gold);}
.logo-sub{color:var(--text-dim); font-size:14px; margin-top:4px;}

.step-label{color:var(--teal); font-size:13px; font-weight:600; margin-bottom:6px;}
.step-heading{font-size:22px; font-weight:700; margin-bottom:4px;}
.step-desc{color:var(--text-dim); font-size:14px; margin-bottom:18px;}

.name-input{
  width:100%; padding:16px; border-radius:16px; border:1.5px solid var(--surface-light);
  background:var(--surface); color:var(--text); font-family:inherit; font-size:16px;
  outline:none;
}
.name-input:focus{border-color:var(--gold);}

.cat-grid{display:flex; flex-direction:column; gap:10px; margin-bottom:16px;}
.cat-card{
  background:var(--surface); border:1.5px solid var(--surface-light); border-radius:18px;
  padding:14px 16px; display:flex; align-items:center; gap:12px; cursor:pointer;
  transition:.2s;
}
.cat-card .emoji{font-size:26px;}
.cat-card .cname{font-weight:700; font-size:15px;}
.cat-card .chabits{color:var(--text-dim); font-size:12.5px; margin-top:2px;}
.cat-card.open{border-color:var(--teal);}
.habit-list{display:none; flex-direction:column; gap:8px; margin-top:12px; padding-top:12px; border-top:1px dashed var(--surface-light);}
.habit-list.show{display:flex;}
.habit-chip{
  display:flex; align-items:center; justify-content:space-between;
  background:var(--bg-deep); border:1.5px solid var(--surface-light); border-radius:12px;
  padding:10px 12px; font-size:13.5px; cursor:pointer;
}
.habit-chip.selected{border-color:var(--gold); background:rgba(232,184,75,.1);}
.habit-chip .check{
  width:20px; height:20px; border-radius:50%; border:1.5px solid var(--text-dim);
  display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0;
}
.habit-chip.selected .check{background:var(--gold); border-color:var(--gold); color:var(--bg-deep);}

.primary-btn{
  width:100%; padding:16px; border:none; border-radius:16px; font-family:inherit;
  font-size:16px; font-weight:700; cursor:pointer; margin-top:8px;
  background:linear-gradient(90deg, var(--gold), #f3d17e); color:var(--bg-deep);
  box-shadow:0 6px 20px rgba(232,184,75,.25);
}
.primary-btn:disabled{opacity:.4; box-shadow:none;}
.ghost-btn{
  width:100%; padding:14px; border-radius:16px; margin-top:10px; text-align:center;
  background:transparent; border:1.5px solid var(--surface-light); color:var(--text-dim);
  font-family:inherit; font-size:14px; cursor:pointer;
}
.selected-count{font-size:12.5px; color:var(--text-dim); margin-top:10px; text-align:center;}

/* ---------- Dashboard ---------- */
.top-row{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
.greet{font-size:13px; color:var(--text-dim);}
.greet b{color:var(--text);}
.level-pill{
  background:var(--surface); border:1px solid var(--surface-light); border-radius:999px;
  padding:6px 12px; font-size:12px; display:flex; align-items:center; gap:6px;
}
.xp-bar-wrap{background:var(--surface); border-radius:999px; height:8px; margin:10px 0 22px; overflow:hidden;}
.xp-bar{height:100%; background:linear-gradient(90deg, var(--teal), var(--gold)); border-radius:999px; transition:width .5s ease;}

.rosette-wrap{position:relative; display:flex; justify-content:center; margin:10px 0 6px;}
.rosette-center-label{
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  text-align:center; pointer-events:none;
}
.rosette-num{font-family:'Lalezar'; font-size:44px; color:var(--gold); line-height:1;}
.rosette-cap{font-size:11px; color:var(--text-dim); margin-top:2px;}

.section-title{font-size:15px; font-weight:700; margin:22px 0 12px; display:flex; align-items:center; gap:8px;}
.section-title .bar{width:4px; height:16px; background:var(--teal); border-radius:2px;}

.today-card{
  background:var(--surface); border:1.5px solid var(--surface-light); border-radius:16px;
  padding:13px 14px; display:flex; align-items:center; gap:12px; margin-bottom:10px; cursor:pointer;
  transition:.15s;
}
.today-card.done{border-color:var(--gold); background:rgba(232,184,75,.08);}
.today-card .circle{
  width:26px; height:26px; border-radius:50%; border:2px solid var(--text-dim); flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:13px; transition:.15s;
}
.today-card.done .circle{background:var(--gold); border-color:var(--gold); color:var(--bg-deep);}
.today-card .h-emoji{font-size:20px;}
.today-card .h-name{font-size:14.5px; font-weight:600; flex:1;}
.today-card .h-cat{font-size:11px; color:var(--text-dim);}

.empty-hint{color:var(--text-dim); font-size:13px; text-align:center; padding:20px 10px;}

/* ---------- Performance chart ---------- */
.performance-card{
  background:var(--surface); border:1.5px solid var(--surface-light); border-radius:18px;
  padding:14px 14px 12px; margin-bottom:12px;
}
.performance-stats{display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; margin-bottom:12px;}
.performance-stat{
  background:var(--bg-deep); border:1px solid var(--surface-light); border-radius:14px;
  padding:9px 6px; text-align:center; min-width:0;
}
.performance-stat span{display:block; color:var(--text-dim); font-size:10px; line-height:1.4; white-space:nowrap;}
.performance-stat b{display:block; color:var(--text); font-size:17px; line-height:1.2; margin-top:3px;}
.performance-bars{
  height:150px; display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:8px;
  align-items:end; padding:8px 2px 0;
}
.performance-day{min-width:0; display:flex; flex-direction:column; align-items:center; gap:6px;}
.performance-track{
  width:100%; max-width:30px; height:108px; background:var(--bg-deep); border:1px solid var(--surface-light);
  border-radius:999px; overflow:hidden; display:flex; align-items:flex-end;
}
.performance-fill{
  width:100%; height:var(--h); background:linear-gradient(180deg,var(--teal),var(--gold));
  border-radius:999px 999px 0 0; transition:height .35s ease;
}
.performance-day.has-activity .performance-fill{min-height:6px;}
.performance-day.complete .performance-fill{background:linear-gradient(180deg,#f3d17e,var(--gold)); box-shadow:0 0 12px rgba(232,184,75,.28);}
.performance-day.today .performance-track{border-color:var(--gold);}
.performance-percent{font-size:10px; color:var(--text-dim); min-height:13px; line-height:1;}
.performance-label{font-size:10.5px; color:var(--text-dim); line-height:1; white-space:nowrap;}
.performance-day.today .performance-label{color:var(--gold); font-weight:700;}
.performance-note{font-size:12px; color:var(--text-dim); text-align:center; line-height:1.7; margin-top:10px;}

/* ---------- Challenges ---------- */
.challenge-card{
  background:var(--surface); border:1.5px solid var(--surface-light); border-radius:18px;
  padding:16px; margin-bottom:12px;
}
.challenge-top{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px;}
.challenge-title{font-size:15.5px; font-weight:700;}
.challenge-days{font-size:11px; color:var(--teal); font-weight:700; background:rgba(46,196,182,.12); padding:4px 9px; border-radius:999px;}
.challenge-desc{color:var(--text-dim); font-size:13px; margin-bottom:12px; line-height:1.7;}
.challenge-progress-wrap{background:var(--bg-deep); border-radius:999px; height:7px; overflow:hidden; margin-bottom:10px;}
.challenge-progress{height:100%; background:linear-gradient(90deg,var(--coral),var(--gold)); border-radius:999px;}
.small-btn{
  padding:10px 14px; border-radius:12px; border:none; font-family:inherit; font-weight:700;
  font-size:13px; cursor:pointer; background:var(--surface-light); color:var(--text);
}
.small-btn.active{background:var(--gold); color:var(--bg-deep);}

/* ---------- Achievements ---------- */
.badge-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px;}
.badge-card{
  background:var(--surface); border:1.5px solid var(--surface-light); border-radius:16px;
  padding:14px 8px; text-align:center; opacity:.35; filter:grayscale(1);
}
.badge-card.unlocked{opacity:1; filter:none; border-color:var(--gold); box-shadow:0 0 18px rgba(232,184,75,.18);}
.badge-emoji{font-size:26px; margin-bottom:6px;}
.badge-name{font-size:11.5px; font-weight:700;}
.badge-desc{font-size:10px; color:var(--text-dim); margin-top:3px; line-height:1.4;}

/* ---------- Screen headers ---------- */
.screen-heading{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px;}
.screen-heading .section-title{margin:0;}
.back-home-btn{
  width:36px; height:36px; border:none; border-radius:12px; flex-shrink:0;
  background:var(--surface); color:var(--text); border:1px solid var(--surface-light);
  font-family:inherit; font-size:22px; line-height:1; cursor:pointer;
}
.back-home-btn:active{transform:scale(.95);}

.share-achievement-btn{
  min-height:44px; padding:10px 12px; border:none; border-radius:12px;
  background:linear-gradient(90deg, var(--teal), #69d8ce); color:var(--bg-deep);
  font-family:inherit; font-size:13px; font-weight:800; cursor:pointer; white-space:nowrap;
}
.share-achievement-btn:active{transform:scale(.98);}
.share-achievement-inline{width:100%; margin:0 0 4px;}

/* ---------- Bottom nav ---------- */
#bottom-nav{
  position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:460px;
  background:rgba(29,27,58,.92); backdrop-filter:blur(14px); border-top:1px solid var(--surface-light);
  display:flex; justify-content:space-around; padding:10px 6px 14px; z-index:50;
}
.nav-btn{
  background:none; border:none; color:var(--text-dim); font-family:inherit; font-size:11px;
  display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; flex:1;
}
.nav-btn .ic{font-size:20px;}
.nav-btn.active{color:var(--gold);}
.nav-btn.reset-nav-btn{color:#F19A9A;}

/* ---------- Toast / confetti ---------- */
#toast{
  position:fixed; top:24px; left:50%; transform:translateX(-50%) translateY(-40px);
  background:var(--surface); border:1.5px solid var(--gold); color:var(--text);
  padding:12px 20px; border-radius:14px; font-size:13.5px; font-weight:600; z-index:100;
  opacity:0; transition:.35s; text-align:center; max-width:88%;
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
#confetti-canvas{position:fixed; inset:0; pointer-events:none; z-index:99;}

/* ---------- Add custom habit ---------- */
.add-cat-card{
  border:1.5px dashed var(--teal); background:rgba(46,196,182,.06);
}
.add-cat-card .cname{color:var(--teal);}
.add-habit-row{display:flex; gap:8px; margin-top:4px;}
.add-habit-input{
  flex:1; padding:11px 12px; border-radius:12px; border:1.5px solid var(--surface-light);
  background:var(--bg-deep); color:var(--text); font-family:inherit; font-size:13.5px; outline:none;
}
.add-habit-input:focus{border-color:var(--teal);}
.add-habit-btn{
  padding:11px 16px; border:none; border-radius:12px; background:var(--teal); color:var(--bg-deep);
  font-family:inherit; font-weight:700; font-size:13px; cursor:pointer; white-space:nowrap;
}
.custom-habit-tag{
  display:inline-flex; align-items:center; gap:6px; background:var(--bg-deep); border:1.5px solid var(--teal);
  border-radius:999px; padding:6px 10px 6px 6px; font-size:12.5px; margin:4px 6px 0 0;
}
.custom-habit-tag .rm{
  width:16px; height:16px; border-radius:50%; background:var(--surface-light); display:flex;
  align-items:center; justify-content:center; font-size:10px; cursor:pointer; color:var(--text-dim);
}
.add-habit-card-dash{
  border:1.5px dashed var(--teal); background:rgba(46,196,182,.06); border-radius:16px;
  padding:13px 14px; margin-bottom:10px; cursor:pointer; text-align:center; color:var(--teal);
  font-weight:700; font-size:13.5px;
}
.add-habit-dash-form{display:none; margin-top:10px;}
.add-habit-dash-form.show{display:flex; gap:8px;}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div id="toast"></div>
<div id="app">

  <!-- ============ ONBOARDING ============ -->
  <section id="screen-onboarding" class="screen active">
    <div id="ob-step-1">
      <div class="logo-wrap">
        <div class="logo-mark"></div>
        <div class="logo-title">خطوة</div>
        <div class="logo-sub">كل عادة صغيرة... خطوة توصلك أبعد</div>
      </div>
      <div class="step-label">وش اسمك؟</div>
      <div class="step-heading">تعال نبدأ رحلتك</div>
      <div class="step-desc">اكتب اسمك عشان نخصص لك التطبيق</div>
      <input class="name-input" id="nameInput" placeholder="مثال: سارة" maxlength="20">
      <button class="primary-btn" id="ob1-next">التالي ←</button>
    </div>

    <div id="ob-step-2" style="display:none;">
      <div class="step-label">اختر عاداتك</div>
      <div class="step-heading">وش تبي تطوّر بحياتك؟</div>
      <div class="step-desc">اختر 3 عادات أو أكثر تبي تبدأ فيها (تقدر تغيّرها لاحقًا)</div>
      <div class="cat-grid" id="catGrid"></div>
      <div class="selected-count" id="selCount">0 عادة مختارة</div>
      <button class="primary-btn" id="ob2-next" disabled>ابدأ رحلتي 🚀</button>
    </div>
  </section>

  <!-- ============ DASHBOARD ============ -->
  <section id="screen-dashboard" class="screen">
    <div class="top-row">
      <div class="greet">هلا، <b id="dashName">-</b> 👋</div>
      <div class="level-pill">⭐ <span id="levelLabel">مبتدئ</span></div>
    </div>
    <div class="xp-bar-wrap"><div class="xp-bar" id="xpBar" style="width:0%"></div></div>

    <div class="rosette-wrap">
      <svg id="rosetteSvg" width="260" height="260" viewBox="0 0 300 300"></svg>
      <div class="rosette-center-label">
        <div class="rosette-num" id="streakNum">0</div>
        <div class="rosette-cap">يوم متتالي</div>
      </div>
    </div>

    <div class="section-title"><span class="bar"></span> أداء الالتزام</div>
    <div id="performanceChart"></div>
    <button class="share-achievement-btn share-achievement-inline" id="shareAchievementBtn" type="button">مشاركة الإنجاز كصورة</button>

    <div class="section-title"><span class="bar"></span> عادات اليوم</div>
    <div id="todayList"></div>

    <div class="add-habit-card-dash" id="dashAddCard">
      <div id="dashAddLabel">➕ أضف عادة جديدة</div>
      <div class="add-habit-dash-form" id="dashAddForm">
        <input class="add-habit-input" id="dashHabitInput" placeholder="اكتب اسم العادة">
        <button class="add-habit-btn" id="dashHabitAddBtn">إضافة</button>
      </div>
    </div>
  </section>

  <!-- ============ CHALLENGES ============ -->
  <section id="screen-challenges" class="screen">
    <div class="screen-heading">
      <div class="section-title"><span class="bar"></span> تحديات 30 يوم</div>
      <button class="back-home-btn" type="button" data-home aria-label="العودة للرئيسية" title="العودة للرئيسية">←</button>
    </div>
    <div id="challengeList"></div>
  </section>

  <!-- ============ ACHIEVEMENTS ============ -->
  <section id="screen-achievements" class="screen">
    <div class="screen-heading">
      <div class="section-title"><span class="bar"></span> إنجازاتك</div>
      <button class="back-home-btn" type="button" data-home aria-label="العودة للرئيسية" title="العودة للرئيسية">←</button>
    </div>
    <div class="badge-grid" id="badgeGrid"></div>
  </section>

</div>
<nav id="bottom-nav">
  <button class="nav-btn active" data-screen="dashboard"><span class="ic">🏠</span>الرئيسية</button>
  <button class="nav-btn" data-screen="challenges"><span class="ic">🔥</span>تحديات</button>
  <button class="nav-btn" data-screen="achievements"><span class="ic">🏆</span>إنجازات</button>
  <button class="nav-btn reset-nav-btn" id="resetLink" type="button"><span class="ic">↻</span>إعادة</button>
</nav>

<script>
/* ============================================================
   ⚙️ إعدادات التخصيص — عدّل هنا فقط عشان تخصص نسخة لكل زبون
   ============================================================
   لو حطيت اسم بين القوسين، التطبيق بيتخطى خطوة "اكتب اسمك"
   وبيخاطب الشخص باسمه مباشرة من أول ثانية (خدمة تخصيص تقدر تبيعها
   كإضافة مدفوعة فوق سعر المنتج الأساسي).
   مثال: presetName: "سارة"
============================================================ */
const CONFIG = {
  presetName: ""   // اكتب اسم الزبون هنا بين علامتي التنصيص قبل ما ترسل له الملف
};

/* ============================================================
   PWA SETUP — أيقونة + Manifest + Service Worker
   كلها مدمجة جوا الملف نفسه (ملف واحد فقط)، بس تشتغل بكامل
   مفعولها فقط لما الملف يكون مستضاف على رابط https (مثل GitHub Pages
   أو منصة سلة). لو المستخدم فتح الملف مباشرة من الجوال (بدون استضافة)،
   الأيقونة والاسم على الشاشة الرئيسية بيشتغلوا، لكن وضع "standalone"
   الكامل (بدون شريط المتصفح) يحتاج استضافة حقيقية.
============================================================ */
const APP_ICON_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><linearGradient id="ig" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#F3D17E"/><stop offset="45%" stop-color="#E8B84B"/>
    <stop offset="75%" stop-color="#2EC4B6"/><stop offset="100%" stop-color="#FF6B6B"/>
  </linearGradient></defs>
  <rect width="200" height="200" rx="42" fill="#12102A"/>
  <circle cx="100" cy="100" r="62" fill="none" stroke="url(#ig)" stroke-width="14"/>
  <circle cx="100" cy="100" r="20" fill="#E8B84B"/>
</svg>`;
function setupPWA(){
  const iconDataUri = 'data:image/svg+xml;utf8,' + encodeURIComponent(APP_ICON_SVG);
  document.getElementById('appleIconLink').setAttribute('href', iconDataUri);
  document.getElementById('faviconLink').setAttribute('href', iconDataUri);

  const manifest = {
    name: "خطوة - تتبع عاداتك اليومية",
    short_name: "خطوة",
    start_url: "./",
    display: "standalone",
    orientation: "portrait",
    background_color: "#12102A",
    theme_color: "#12102A",
    icons: [

  if('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname==='localhost')){
    const swCode = `
      self.addEventListener('install', e => self.skipWaiting());
      self.addEventListener('activate', e => self.clients.claim());
      self.addEventListener('fetch', e => {
        e.respondWith(fetch(e.request).catch(()=> caches.match(e.request)));
      });
    `;
    const swBlob = new Blob([swCode], {type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
  }
}

/* ============================================================
   STATE
============================================================ */
const STORAGE_KEY = 'khatwa_state_v1';
function defaultState(){
  return { name:'', selectedHabits:[], logs:{}, xp:0, joinedChallenge:null, challengeStart:null, badgesUnlocked:[], completedChallenges:0, customHabits:[] };
}
function getHabitById(id){
  return ALL_HABITS.find(h=>h.id===id) || (state.customHabits||[]).find(h=>h.id===id);
}
let state = loadState();
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    return {...defaultState(), ...JSON.parse(raw)};
  }catch(e){ return defaultState(); }
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function todayStr(d=new Date()){ return d.toISOString().slice(0,10); }
function dateMinus(n){ const d=new Date(); d.setDate(d.getDate()-n); return todayStr(d); }

/* ============================================================
   DERIVED STATS
============================================================ */
function dayComplete(dateStr){
  const log = state.logs[dateStr];
  if(!log || state.selectedHabits.length===0) return false;
  return state.selectedHabits.every(h => log.includes(h));
}
function computeStreak(){
  let streak = 0;
  let i = 0;
  // allow today to be "in progress" without breaking streak count for yesterday
  while(true){
    const d = dateMinus(i);
    if(dayComplete(d)){ streak++; i++; }
    else if(i===0){ i++; continue; } // today not finished yet, check yesterday
    else break;
  }
  return streak;
}
function totalDaysActive(){
  return Object.keys(state.logs).filter(d => state.logs[d] && state.logs[d].length>0).length;
}
function currentLevel(){
  let lvl = LEVELS[0];
  for(const l of LEVELS) if(state.xp >= l.min) lvl = l;
  return lvl;
}
function nextLevelXp(){
  const idx = LEVELS.findIndex(l=>l.name===currentLevel().name);
  return idx < LEVELS.length-1 ? LEVELS[idx+1].min : LEVELS[idx].min + 500;
}
function dayPerformance(dateStr){
  const selected = state.selectedHabits || [];
  const log = Array.isArray(state.logs[dateStr]) ? state.logs[dateStr] : [];
  const done = new Set(log.filter(id => selected.includes(id))).size;
  const total = selected.length;
  const percent = total ? Math.round((done / total) * 100) : 0;
  return { date: dateStr, done, total, percent, complete: total > 0 && done === total };
}
function chartDayLabel(dateStr, offset){
  if(offset === 0) return 'اليوم';
  const date = new Date(dateStr + 'T12:00:00');
  return new Intl.DateTimeFormat('ar-SA', { weekday:'short' }).format(date);
}
function weeklyPerformance(days=7){
  return Array.from({length:days}, (_, i)=>{
    const offset = days - 1 - i;
    const date = dateMinus(offset);
    return { ...dayPerformance(date), label: chartDayLabel(date, offset), isToday: offset === 0 };
  });
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
function confetti(){
  const canvas = document.getElementById('confetti-canvas');
  canvas.width = innerWidth; canvas.height = innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#E8B84B','#2EC4B6','#FF6B6B','#F5F3FF'];
  const parts = Array.from({length:60}, ()=>({
    x: innerWidth/2, y: innerHeight*0.35,
    vx:(Math.random()-0.5)*11, vy: Math.random()*-9-3,
    g: 0.28, size: Math.random()*6+4, color: colors[Math.floor(Math.random()*colors.length)],
    rot: Math.random()*360, vr:(Math.random()-0.5)*14
  }));
  let frame=0;
  function draw(){
    frame++;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    parts.forEach(p=>{
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color; ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
      ctx.restore();
    });
    if(frame<70) requestAnimationFrame(draw); else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

/* ============================================================
   ROSETTE (signature visual): 30-petal geometric bloom
============================================================ */
function renderRosette(){
  const svg = document.getElementById('rosetteSvg');
  const streak = computeStreak();
  const cx=150, cy=150, N=30;
  let html = '';
  // outer faint guide ring
  html += `<circle cx="${cx}" cy="${cy}" r="132" fill="none" stroke="#2A2854" stroke-width="1" opacity="0.5"/>`;
  for(let i=0;i<N;i++){
    const angle = -90 + i*(360/N);
    const rad = angle*Math.PI/180;
    const isWeekMark = (i+1)%7===0;
    const len = isWeekMark ? 128 : 112;
    const wid = isWeekMark ? 15 : 11;
    const tipX = cx + len*Math.cos(rad);
    const tipY = cy + len*Math.sin(rad);
    const perpX = Math.cos(rad+Math.PI/2)*wid;
    const perpY = Math.sin(rad+Math.PI/2)*wid;
    const midLen = len*0.55;
    const midX = cx + midLen*Math.cos(rad);
    const midY = cy + midLen*Math.sin(rad);
    const c1x = midX+perpX, c1y = midY+perpY;
    const c2x = midX-perpX, c2y = midY-perpY;
    const path = `M${cx},${cy} Q${c1x},${c1y} ${tipX},${tipY} Q${c2x},${c2y} ${cx},${cy} Z`;
    const filled = i < streak;
    let fill = 'rgba(169,166,201,0.12)';
    let stroke = '#2A2854';
    if(filled){
      if(i<7){ fill='url(#gradTeal)'; }
      else if(i<14){ fill='url(#gradGold)'; }
      else if(i<21){ fill='url(#gradCoral)'; }
      else { fill='url(#gradGold)'; }
      stroke = 'rgba(0,0,0,0)';
    }
    const glow = filled ? 'filter="url(#softGlow)"' : '';
    html += `<path d="${path}" fill="${fill}" stroke="${stroke}" stroke-width="1" ${glow}/>`;
  }
  html += `<circle cx="${cx}" cy="${cy}" r="26" fill="#0B0A1E" stroke="#E8B84B" stroke-width="2"/>`;
  const defs = `<defs>
    <linearGradient id="gradGold" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F3D17E"/><stop offset="100%" stop-color="#E8B84B"/></linearGradient>
    <linearGradient id="gradTeal" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6FE0D4"/><stop offset="100%" stop-color="#2EC4B6"/></linearGradient>
    <linearGradient id="gradCoral" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF9A9A"/><stop offset="100%" stop-color="#FF6B6B"/></linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>`;
  svg.innerHTML = defs + html;
  document.getElementById('streakNum').textContent = streak;
}

  const pct = Math.min(100, ((state.xp-prevMin)/(nxt-prevMin))*100);
  document.getElementById('xpBar').style.width = pct+'%';
  renderRosette();

function toggleHabitToday(hid){
  const t = todayStr();
  if(!state.logs[t]) state.logs[t] = [];
  const idx = state.logs[t].indexOf(hid);
  const wasComplete = dayComplete(t);
  if(idx>=0){ state.logs[t].splice(idx,1); state.xp = Math.max(0, state.xp-10); }
  else { state.logs[t].push(hid); state.xp += 10; }
  const nowComplete = dayComplete(t);
  if(!wasComplete && nowComplete){
    toast('🎉 خلصت عادات اليوم! استمر كذا');
    confetti();
    checkChallengeProgress();
  }
  saveState();
  checkBadges();
  renderDashboard();
}

function daysSinceStart(){
  if(!state.challengeStart) return 0;
  const start = new Date(state.challengeStart);
  const now = new Date();
  return Math.floor((now-start)/86400000)+1;
}
function checkChallengeProgress(){
  if(!state.joinedChallenge) return;
  const ch = CHALLENGES.find(c=>c.id===state.joinedChallenge);
  if(!ch) return;
  const elapsed = daysSinceStart();
  if(elapsed >= ch.days){
    state.completedChallenges += 1;
    state.joinedChallenge = null;
    state.challengeStart = null;
    toast('🏆 مبروك! أكملت "'+ch.title+'" بنجاح');
    confetti();
    saveState();
  }
}
function renderChallenges(){
  const wrap = document.getElementById('challengeList');
  wrap.innerHTML = '';
  CHALLENGES.forEach(ch=>{
    const joined = state.joinedChallenge===ch.id;
    const elapsed = joined ? Math.min(ch.days, daysSinceStart()) : 0;
    const pct = joined ? (elapsed/ch.days*100) : 0;
    const card = document.createElement('div');
    card.className = 'challenge-card';
    card.innerHTML = `

      <button class="small-btn ${joined?'active':''}" data-cid="${ch.id}">
        ${joined? 'جارٍ التحدي 🔥' : (state.joinedChallenge? 'انضم (تحدي واحد بالمرة)' : 'ابدأ التحدي')}
      </button>
    `;
    const btn = card.querySelector('button');
    if(!state.joinedChallenge || joined){

      });

      btn.disabled = true;
    }
    wrap.appendChild(card);
  });
}

  grid.innerHTML = '';
  BADGES.forEach(b=>{
    const unlocked = state.badgesUnlocked.includes(b.id);
    const card = document.createElement('div');
    card.className = 'badge-card' + (unlocked?' unlocked':'');
    card.innerHTML = `<div class="badge-emoji">${b.emoji}</div><div class="badge-name">${b.name}</div><div class="badge-desc">${b.desc}</div>`;
    grid.appendChild(card);
  });
}

/* ============================================================
   SHARE ACHIEVEMENT IMAGE
============================================================ */
function roundedRect(ctx, x, y, width, height, radius){
  const r = Math.min(radius, width / 2, height / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + width, y, x + width, y + height, r);
  ctx.arcTo(x + width, y + height, x, y + height, r);
  ctx.arcTo(x, y + height, x, y, r);
  ctx.arcTo(x, y, x + width, y, r);
  ctx.closePath();
}

function createAchievementImage(){
  const canvas = document.createElement('canvas');
  const width = 1080;
  const height = 1350;
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');
  const days = weeklyPerformance(7);
  const average = Math.round(days.reduce((sum, day)=>sum + day.percent, 0) / days.length);
  const today = days[days.length - 1];
  const streak = computeStreak();
  const name = String(state.name || 'صديقنا').slice(0, 28);

  ctx.fillStyle = '#12102A';
  ctx.fillRect(0, 0, width, height);
  ctx.fillStyle = '#241F52';
  ctx.beginPath();
  ctx.arc(960, 80, 290, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1D1B3A';
  roundedRect(ctx, 70, 70, 940, 1210, 48);
  ctx.fill();
  ctx.strokeStyle = '#3A376C';
  ctx.lineWidth = 3;
  roundedRect(ctx, 70, 70, 940, 1210, 48);
  ctx.stroke();

  ctx.direction = 'rtl';
  ctx.textAlign = 'right';
  ctx.fillStyle = '#E8B84B';
  ctx.font = '700 58px Arial, sans-serif';
  ctx.fillText('خطوة', 920, 165);
  ctx.fillStyle = '#A9A6C9';
  ctx.font = '400 30px Arial, sans-serif';
  ctx.fillText('إنجاز اليوم', 920, 215);

  ctx.fillStyle = '#0B0A1E';
  roundedRect(ctx, 120, 275, 840, 365, 34);
  ctx.fill();
  ctx.fillStyle = '#F5F3FF';
  ctx.font = '700 42px Arial, sans-serif';
  ctx.fillText('أحسنت يا ' + name, 900, 360);
  ctx.fillStyle = '#A9A6C9';
  ctx.font = '400 28px Arial, sans-serif';
  ctx.fillText('أكملت اليوم', 900, 415);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#2EC4B6';
  ctx.font = '700 168px Arial, sans-serif';
  ctx.fillText(today.percent + '%', 540, 545);
  ctx.fillStyle = '#F5F3FF';
  ctx.font = '600 34px Arial, sans-serif';
  ctx.fillText(today.done + ' من ' + today.total + ' عادة', 540, 600);

  ctx.direction = 'rtl';
  ctx.textAlign = 'right';
  ctx.fillStyle = '#F5F3FF';
  ctx.font = '700 34px Arial, sans-serif';
  ctx.fillText('أداء آخر 7 أيام', 900, 725);
  const chartX = 170;
  const chartY = 1015;
  const chartHeight = 210;
  const barWidth = 70;
  const gap = 45;
  days.forEach((day, index)=>{
    const x = chartX + index * (barWidth + gap);
    ctx.fillStyle = '#0B0A1E';
    roundedRect(ctx, x, chartY - chartHeight, barWidth, chartHeight, 28);
    ctx.fill();
    const fillHeight = Math.max(day.done > 0 ? 12 : 0, chartHeight * day.percent / 100);
    if(fillHeight > 0){
      ctx.fillStyle = day.complete ? '#E8B84B' : '#2EC4B6';
      roundedRect(ctx, x, chartY - fillHeight, barWidth, fillHeight, 28);
      ctx.fill();
    }
    ctx.direction = 'ltr';
    ctx.textAlign = 'center';
    ctx.fillStyle = day.isToday ? '#E8B84B' : '#A9A6C9';
    ctx.font = '600 23px Arial, sans-serif';
    ctx.fillText(day.percent + '%', x + barWidth / 2, chartY + 42);
  });

  ctx.direction = 'rtl';
  ctx.textAlign = 'right';
  ctx.fillStyle = '#2A2854';
  roundedRect(ctx, 120, 1110, 840, 110, 26);
  ctx.fill();
  ctx.fillStyle = '#F5F3FF';
  ctx.font = '700 30px Arial, sans-serif';
  ctx.fillText('سلسلتك الحالية: ' + streak + ' يوم', 900, 1178);
  ctx.fillStyle = '#A9A6C9';
  ctx.font = '400 25px Arial, sans-serif';
  ctx.fillText('متوسط الالتزام هذا الأسبوع: ' + average + '%', 900, 1260);

  return canvas;
}

async function shareAchievementAsImage(){
  const canvas = createAchievementImage();
  const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
  if(!blob){
    toast('ما قدرنا ننشئ صورة الإنجاز، جرّب مرة ثانية.');
    return;
  }

  const file = new File([blob], 'khatwa-achievement.png', {type:'image/png'});
  const shareData = {
    title: 'إنجازي في خطوة',
    text: 'أتابع عاداتي اليومية مع خطوة.',
    files: [file]
  };

  if(navigator.canShare && navigator.canShare(shareData)){
    try{
      await navigator.share(shareData);
    } catch(error){
      if(error && error.name !== 'AbortError') toast('تعذرت المشاركة الآن، جرّب مرة ثانية.');
    }
    return;
  }

  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = 'khatwa-achievement.png';
  link.click();
  URL.revokeObjectURL(url);
  toast('تم حفظ صورة إنجازك في التنزيلات.');
}

/* ============================================================
   NAVIGATION
============================================================ */
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.screen===name));
  if(name==='dashboard') renderDashboard();
  if(name==='challenges') renderChallenges();
  if(name==='achievements') renderBadges();
}
document.querySelectorAll('.nav-btn[data-screen]').forEach(btn=>{
  btn.addEventListener('click', ()=> showScreen(btn.dataset.screen));
});
document.querySelectorAll('[data-home]').forEach(btn=>{
  btn.addEventListener('click', ()=> showScreen('dashboard'));
});
document.getElementById('shareAchievementBtn').addEventListener('click', shareAchievementAsImage);

  if(e.target.closest('.add-habit-dash-form')) return;

});
document.getElementById('dashHabitInput').addEventListener('click', e=> e.stopPropagation());

============================================================ */
document.getElementById('ob1-next').addEventListener('click', ()=>{
  const name = document.getElementById('nameInput').value.trim();
  if(!name){ document.getElementById('nameInput').focus(); return; }
  state.name = name; saveState();
  document.getElementById('ob-step-1').style.display='none';

  document.getElementById('bottom-nav').style.display='flex';

  showScreen('dashboard');
});

document.getElementById('resetLink').addEventListener('click', ()=>{
  if(confirm('متأكد تبي تمسح كل بياناتك وتبدأ من الصفر؟')){
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
});

/* ============================================================
   BOOT
============================================================ */
function boot(){
  // لو المطوّر (فيصل) حط اسم جاهز في CONFIG قبل ما يرسل الملف للزبون
  if(CONFIG.presetName && !state.name){
    state.name = CONFIG.presetName;
    saveState();
  }
  if(state.name && state.selectedHabits.length>0){
    document.getElementById('screen-onboarding').classList.remove('active');
    document.getElementById('bottom-nav').style.display='flex';
    showScreen('dashboard');
  } else if(state.name){
    // الاسم جاهز، بس لسه ما اختار عادات — نروح مباشرة لخطوة اختيار العادات
    document.getElementById('nameInput').value = state.name;
    document.getElementById('ob-step-1').style.display='none';
    document.getElementById('ob-step-2').style.display='block';
    document.getElementById('bottom-nav').style.display='none';
    renderCategoryGrid();
  } else {
    document.getElementById('bottom-nav').style.display='none';
  }
}
boot();
</script>
